<!DOCTYPE html><html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hesaplama Araçları</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body { background: #0f172a; color: #e2e8f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { width: 100%; max-width: 500px; padding: 20px; }
    h1 { text-align: center; margin-bottom: 20px; }
    .card { background: #1e293b; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
    input, select, button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }
    input, select { background: #334155; color: #fff; }
    button { background: #38bdf8; color: #000; font-weight: bold; cursor: pointer; }
    button:hover { background: #0ea5e9; }
    .result { margin-top: 15px; font-size: 18px; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hesaplama Araçları</h1><div class="card">
  <h3>Yüzde Hesaplama</h3>
  <input type="number" id="value" placeholder="Sayı" />
  <input type="number" id="percent" placeholder="Yüzde" />
  <button onclick="calculatePercent()">Hesapla</button>
  <div class="result" id="percentResult"></div>
</div>

<div class="card" style="margin-top:20px;">
  <h3>BMI Hesaplama</h3>
  <input type="number" id="weight" placeholder="Kilo (kg)" />
  <input type="number" id="height" placeholder="Boy (cm)" />
  <button onclick="calculateBMI()">Hesapla</button>
  <div class="result" id="bmiResult"></div>
</div>

  </div>  <script>
    function calculatePercent() {
      const value = document.getElementById('value').value;
      const percent = document.getElementById('percent').value;
      if (!value || !percent) return;
      const result = (value * percent) / 100;
      document.getElementById('percentResult').innerText = "Sonuç: " + result;
    }

    function calculateBMI() {
      const weight = document.getElementById('weight').value;
      const height = document.getElementById('height').value / 100;
      if (!weight || !height) return;
      const bmi = weight / (height * height);
      document.getElementById('bmiResult').innerText = "BMI: " + bmi.toFixed(2);
    }
  </script></body>
</html>
