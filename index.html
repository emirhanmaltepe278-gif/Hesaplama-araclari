<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hepsi Bir Arada Hesaplayıcı</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { text-align: center; color: var(--primary); font-size: 1.5rem; }
        
        /* Menü Stili */
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { background: #e2e8f0; border: none; padding: 10px 15px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-weight: 600; }
        .tab-btn.active { background: var(--primary); color: white; }

        /* Kart Stili */
        .calc-card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); display: none; }
        .calc-card.active { display: block; }
        
        label { display: block; margin-top: 10px; font-size: 0.9rem; font-weight: 600; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; margin-top: 20px; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        
        .result { margin-top: 20px; padding: 15px; background: #f1f5f9; border-radius: 8px; text-align: center; font-weight: bold; border-left: 5px solid var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h1>🧮 Hesaplama Merkezi</h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('yag')">Yağ Oranı</button>
        <button class="tab-btn" onclick="openTab('not')">Not Ort.</button>
        <button class="tab-btn" onclick="openTab('kalori')">Kalori</button>
    </div>

    <div id="yag" class="calc-card active">
        <h3>Vücut Yağ Oranı (Donanma)</h3>
        <select id="cinsiyet"><option value="erkek">Erkek</option><option value="kadin">Kadın</option></select>
        <label>Boy (cm)</label><input type="number" id="boy" placeholder="Örn: 175">
        <label>Boyun Çevresi (cm)</label><input type="number" id="boyun" placeholder="En dar yer">
        <label>Bel Çevresi (cm)</label><input type="number" id="bel" placeholder="Göbek deliği hizası">
        <button onclick="hesaplaYag()">Hesapla</button>
        <div id="resYag" class="result">Bilgileri giriniz.</div>
    </div>

    <div id="not" class="calc-card">
        <h3>Not Ortalaması Hesapla</h3>
        <label>Vize Notu (%40)</label><input type="number" id="vize" placeholder="0-100">
        <label>Final Notu (%60)</label><input type="number" id="final" placeholder="0-100">
        <button onclick="hesaplaNot()">Hesapla</button>
        <div id="resNot" class="result">Notları giriniz.</div>
    </div>

    <div id="kalori" class="calc-card">
        <h3>Günlük Kalori İhtiyacı</h3>
        <label>Kilo (kg)</label><input type="number" id="kilo" placeholder="Örn: 70">
        <label>Yaş</label><input type="number" id="yas" placeholder="Örn: 25">
        <select id="aktivite">
            <option value="1.2">Hareketsiz (Masa başı)</option>
            <option value="1.375">Hafif Hareketli</option>
            <option value="1.55">Orta Hareketli</option>
            <option value="1.725">Çok Hareketli</option>
        </select>
        <button onclick="hesaplaKalori()">Hesapla</button>
        <div id="resKalori" class="result">Sonuç burada görünecek.</div>
    </div>
</div>

<script>
    function openTab(tabName) {
        document.querySelectorAll('.calc-card').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function hesaplaYag() {
        const c = document.getElementById('cinsiyet').value;
        const b = parseFloat(document.getElementById('boy').value);
        const boyun = parseFloat(document.getElementById('boyun').value);
        const bel = parseFloat(document.getElementById('bel').value);
        let sonuc = 0;

        if(c === "erkek") {
            sonuc = 495 / (1.0324 - 0.19077 * Math.log10(bel - boyun) + 0.15456 * Math.log10(b)) - 450;
        } else {
            // Kadın formülü için kalça da gerekebilir ama basitleştirilmiş hali:
            sonuc = 495 / (1.29579 - 0.35004 * Math.log10(bel + 80 - boyun) + 0.22100 * Math.log10(b)) - 450;
        }
        document.getElementById('resYag').innerText = "% " + sonuc.toFixed(1);
    }

    function hesaplaNot() {
        const v = document.getElementById('vize').value;
        const f = document.getElementById('final').value;
        const ort = (v * 0.4) + (f * 0.6);
        document.getElementById('resNot').innerText = "Ortalama: " + ort.toFixed(2);
    }

    function hesaplaKalori() {
        const kilo = document.getElementById('kilo').value;
        const yas = document.getElementById('yas').value;
        const akt = document.getElementById('aktivite').value;
        const bmr = (10 * kilo) + (6.25 * 175) - (5 * yas) + 5; // Erkek bazlı hızlı formül
        document.getElementById('resKalori').innerText = Math.round(bmr * akt) + " kcal / Gün";
    }
</script>

</body>
                                                 </html>
